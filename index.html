<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clientes Nuevos · Supertiendas Cañaveral</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#05200b; --forest:#1C5A2A; --lime:#7dd105;
  --lime-soft:#f0fadb; --lime-line:#cbe89a;
  --bg:#f5f7f3; --card:#fff; --line:#dfe6db; --line-strong:#c3d0bd;
  --muted:#63735f; --muted-2:#8a9886;
  --red:#b8342a; --red-soft:#fdecea; --amber:#a86a12; --amber-soft:#fdf3e0;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
h1,h2,h3,.disp{font-family:'Archivo',system-ui,sans-serif;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px}
.num{font-variant-numeric:tabular-nums}
::selection{background:var(--lime);color:var(--ink)}
:focus-visible{outline:2px solid var(--forest);outline-offset:2px}

.app{min-height:100vh;display:flex;flex-direction:column}

/* header */
.hd{background:var(--ink);color:#fff;padding:11px 22px;display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:40;box-shadow:0 1px 0 rgba(255,255,255,.07)}
.hd img.logo{height:30px;width:auto;display:block;filter:brightness(0) invert(1);opacity:.96}
.hd .sep{width:1px;height:26px;background:rgba(255,255,255,.16)}
.hd .ttl{font-family:'Archivo';font-size:14.5px;font-weight:700;line-height:1.15}
.hd .ttl span{display:block;font-family:'Inter';font-size:11px;font-weight:500;color:#93a894;margin-top:1px}
.hd-r{margin-left:auto;display:flex;align-items:center;gap:8px}
.chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:100px;
  background:rgba(125,209,5,.12);border:1px solid rgba(125,209,5,.35);color:var(--lime);white-space:nowrap}
.hbtn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;
  padding:7px 13px;border-radius:9px;color:#dbe7db;border:1px solid rgba(255,255,255,.16);transition:.13s}
.hbtn:hover{background:rgba(255,255,255,.09);color:#fff}
.hbtn.on{background:var(--lime);color:var(--ink);border-color:var(--lime)}
.hbtn.ico{padding:7px 9px}
.hbtn svg{width:16px;height:16px;flex-shrink:0}
.hbtn .dotw{width:7px;height:7px;border-radius:50%;background:#ffbe50}

/* menú compartir */
.mw{position:relative}
.mn{position:absolute;right:0;top:calc(100% + 7px);background:#fff;border:1px solid var(--line);
  border-radius:11px;box-shadow:0 14px 36px rgba(5,32,11,.2);padding:5px;min-width:206px;z-index:50}
.mn button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 11px;
  border-radius:8px;font-size:13px;font-weight:600;color:var(--ink)}
.mn button:hover{background:var(--lime-soft)}
.mn button small{display:block;font-weight:400;font-size:11.5px;color:var(--muted);margin-top:1px}
.mn button svg{width:17px;height:17px;flex-shrink:0;color:var(--forest)}
.mn .sepm{height:1px;background:var(--line);margin:4px 6px}

/* banda que solo aparece en la imagen exportada */
.cap-h{display:none;align-items:center;gap:14px;background:#fff;color:var(--ink);
  padding:15px 20px;border-radius:13px;margin-bottom:16px;border:1px solid var(--line);
  border-left:5px solid var(--lime)}
.cap-h img{height:34px;width:auto}
.cap-h .s{width:1px;height:30px;background:var(--line)}
.cap-h h2{font-size:16px;font-weight:700}
.cap-h .p{font-size:12px;color:var(--muted);margin-top:2px}
.cap-h .f{margin-left:auto;text-align:right;font-size:11.5px;color:var(--muted)}
.capturando .cap-h{display:flex}
.capturando .ctrls{display:none}

/* modal */
.ov{position:fixed;inset:0;background:rgba(5,32,11,.45);backdrop-filter:blur(2px);z-index:60;
  display:flex;justify-content:center;align-items:flex-start;padding:26px 16px;overflow-y:auto}
.md{background:var(--bg);border-radius:16px;width:100%;max-width:1080px;overflow:hidden;
  box-shadow:0 24px 70px rgba(5,32,11,.32);animation:pop .16s ease-out}
@keyframes pop{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.md-h{background:var(--ink);color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:2}
.md-h h2{font-size:16px;font-weight:700}
.md-h .x{margin-left:auto;width:32px;height:32px;border-radius:9px;display:grid;place-items:center;
  font-size:19px;color:#93a894;border:1px solid rgba(255,255,255,.14)}
.md-h .x:hover{background:rgba(255,255,255,.1);color:#fff}
.md-t{display:flex;gap:3px;background:var(--ink);padding:0 20px 12px}
.md-t button{font-size:13px;font-weight:600;padding:7px 15px;border-radius:8px;color:#93a894}
.md-t button:hover{color:#fff}
.md-t button.on{background:var(--forest);color:#fff}
.md-b{padding:18px 20px 22px;max-height:calc(100vh - 170px);overflow-y:auto}

.main{flex:1;width:100%;max-width:1360px;margin:0 auto;padding:20px 24px 48px}

/* cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:16px}
.card>h3{font-size:15px;font-weight:700;margin-bottom:3px}
.card>.hint{font-size:12.5px;color:var(--muted);margin-bottom:14px}
.eyebrow{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted-2)}

/* buttons */
.btn{background:var(--forest);color:#fff;border-radius:9px;padding:9px 16px;font-size:13.5px;font-weight:600;transition:.13s}
.btn:hover{background:#24702f}
.btn.lime{background:var(--lime);color:var(--ink)}
.btn.lime:hover{filter:brightness(1.06)}
.btn.gh{background:transparent;color:var(--forest);border:1px solid var(--line-strong)}
.btn.gh:hover{background:var(--lime-soft);border-color:var(--lime-line)}
.btn.sm{padding:6px 12px;font-size:12.5px;border-radius:8px}
.btn.dg{color:var(--red);border-color:#e8bdb8}
.btn.dg:hover{background:var(--red-soft)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* dropzone */
.dz{border:1.5px dashed var(--line-strong);border-radius:12px;padding:22px;text-align:center;transition:.13s;background:#fbfcfa}
.dz.hot{border-color:var(--lime);background:var(--lime-soft)}
.dz h4{font-family:'Archivo';font-size:15px;font-weight:700;margin-bottom:4px}
.dz p{font-size:12.5px;color:var(--muted);margin-bottom:12px}

/* source rows */
.src{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line);border-radius:11px;background:#fbfcfa;margin-bottom:8px}
.src .dot{width:9px;height:9px;border-radius:50%;background:var(--line-strong);flex-shrink:0}
.src.ok .dot{background:var(--lime)}
.src .t{font-weight:600;font-size:13.5px}
.src .d{font-size:12px;color:var(--muted)}
.src .r{margin-left:auto;text-align:right}
.src .r b{font-family:'Archivo';font-size:17px;font-weight:800}

/* controls */
.ctrls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px}
.ct{display:flex;flex-direction:column;gap:5px}
.ct label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2)}
.ct select,.ct input{border:1px solid var(--line-strong);border-radius:9px;padding:8px 11px;background:#fff;min-width:140px}
.seg{display:flex;background:#fff;border:1px solid var(--line-strong);border-radius:10px;overflow:hidden}
.seg button{padding:8px 15px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button+button{border-left:1px solid var(--line)}
.seg button.on{background:var(--forest);color:#fff}

/* kpis */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:11px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;position:relative;overflow:hidden}
.kpi.dark{background:var(--ink);border-color:var(--ink);color:#fff}
.kpi .lb{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-2);margin-bottom:7px}
.kpi.dark .lb{color:#93a894}
.kpi .vl{font-family:'Archivo';font-size:27px;font-weight:800;line-height:1;letter-spacing:-.03em}
.kpi .dt{font-size:11.5px;color:var(--muted);margin-top:6px}
.kpi.dark .dt{color:#93a894}
.kpi .bar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--lime)}

/* table */
.tw{overflow-x:auto;margin:0 -18px;padding:0 18px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-2);
  font-weight:700;padding:8px 9px;border-bottom:1.5px solid var(--line-strong);white-space:nowrap;cursor:pointer;user-select:none}
th.r,td.r{text-align:right}
th:hover{color:var(--forest)}
td{padding:8px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:var(--lime-soft)}
tr.tot td{font-weight:700;background:#eef2ec;border-top:2px solid var(--forest);border-bottom:none}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:100px;letter-spacing:.02em}
.tag.ok{background:var(--lime-soft);color:var(--forest);border:1px solid var(--lime-line)}
.tag.no{background:var(--red-soft);color:var(--red);border:1px solid #eec3be}
.tag.wr{background:var(--amber-soft);color:var(--amber);border:1px solid #edd8ac}
.tag.na{background:#eff1ee;color:var(--muted-2);border:1px solid var(--line)}
.pb{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.trk{position:relative;width:96px;height:7px;border-radius:100px;background:#e6ece3;overflow:hidden;flex-shrink:0}
.trk i{position:absolute;left:0;top:0;bottom:0;border-radius:100px;background:var(--lime)}
.trk i.wr{background:#d9a441}.trk i.no{background:var(--red)}

/* chart */
.cw{margin:2px 0 0}
.lg{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:10px}
.lg span{display:inline-flex;align-items:center;gap:6px}
.sw{width:11px;height:11px;border-radius:3px}

/* grids */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:7px}
.pr{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:#fbfcfa}
.pr .nm{flex:1;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr input{width:82px;border:1px solid var(--line-strong);border-radius:8px;padding:5px 8px;text-align:right;font-weight:600}
.pr input:focus{outline:2px solid var(--lime);border-color:var(--lime)}

.mp{display:grid;grid-template-columns:1fr 1fr 150px 34px;gap:7px;align-items:center;margin-bottom:6px}
.mp input,.mp select{border:1px solid var(--line-strong);border-radius:8px;padding:6px 9px;width:100%;font-size:12.5px}
.mp .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--red);font-size:16px;border:1px solid transparent}
.mp .x:hover{background:var(--red-soft);border-color:#eec3be}
.mph{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted-2)}

.note{border-radius:10px;padding:10px 13px;font-size:12.5px;margin-bottom:13px;border:1px solid}
.note.w{background:var(--amber-soft);border-color:#edd8ac;color:#7a4d0c}
.note.e{background:var(--red-soft);border-color:#eec3be;color:var(--red)}
.note.i{background:var(--lime-soft);border-color:var(--lime-line);color:var(--forest)}

.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:99;box-shadow:0 10px 30px rgba(5,32,11,.28);max-width:90vw}
.empty{padding:44px 20px;text-align:center;color:var(--muted)}
.empty img{width:132px;height:auto;margin:0 auto 16px;display:block}
.empty h4{font-family:'Archivo';font-size:16px;margin-bottom:6px;color:var(--ink)}
.ft{padding:16px 24px;text-align:center;font-size:11.5px;color:var(--muted-2)}

@media(max-width:640px){
  .hd,.main{padding-left:14px;padding-right:14px}
  .main{padding-top:16px}
  .kpi .vl{font-size:22px}
  .trk{width:56px}
  .mp{grid-template-columns:1fr 1fr;gap:6px}
  .mp .x{grid-column:2;justify-self:end}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* impresión / guardar como PDF desde el navegador */
@media print{
  @page{size:A4 landscape;margin:8mm}
  html,body{background:#fff!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .hd,.ov,.toast,.ctrls,.ft{display:none!important}
  .main{max-width:none!important;padding:0!important}
  .cap-h{display:flex!important}
  .card{break-inside:avoid;page-break-inside:avoid;box-shadow:none!important}
  table{font-size:10.5px}
  th,td{padding:5px 7px}
  tbody tr:hover{background:transparent!important}
}
</style>
</head>

/** Clave tolerante: ignora tildes, muletillas (los/las/de…), z vs s y signos.
    Sirve para que «Zarzal - Almendros» cruce con «ZARZAL-LOS ALMENDROS». */
const claveSuave=t=>norm(t)
  .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
  .replace(/\b(DE|DEL|LA|LAS|EL|LOS)\b/g," ")
  .replace(/Z/g,"S")
  .replace(/[^A-Z0-9]/g,"");

/** Busca la sede: exacto → tolerante → por prefijo (gana el más largo). */
function buscarSede(valor,mapa,suave){
  const k=norm(valor);
  if(mapa.has(k)) return mapa.get(k);
  const ks=claveSuave(valor);
  if(!ks) return null;
  if(suave.has(ks)) return suave.get(ks);
  let mejor=null,largo=0;
  for(const [c,v] of suave)
    if((ks.startsWith(c)||c.startsWith(ks)) && c.length>largo){ largo=c.length; mejor=v; }
  return mejor;
}

/** Quita cinemas duplicados y deja una fila por sede (para memorias viejas). */
function migrarMapeo(m){
  const vistas=new Set(), out=[];
  for(const x of m||[]){
    if(!x||!x.sede) continue;
    const sd=x.sede.trim().toUpperCase();
    const cl=/CINEMAS/.test(sd)?NO_INCLUIR:(x.cluster||"Sin cluster");
    if(vistas.has(sd)) continue;
    vistas.add(sd); out.push({origen:x.origen,sede:sd,cluster:cl});
  }
  return out.length?out:MAPEO_INI;
}

/* ══════════ utilidades ══════════ */
const p2=n=>String(n).padStart(2,"0");
const fmt=n=>(n==null||isNaN(n))?"—":Math.round(n).toLocaleString("es-CO");
const fmt1=n=>(n==null||isNaN(n))?"—":(Math.round(n*10)/10).toLocaleString("es-CO");
const pct=n=>(n==null||!isFinite(n))?"—":(Math.round(n*1000)/10).toLocaleString("es-CO")+"%";
const norm=s=>String(s||"").normalize("NFC").trim().toUpperCase().replace(/\s*-\s*/g,"-").replace(/\s+/g," ");
const diasMes=(y,m)=>new Date(y,m,0).getDate();              // m 1-12
const dowDia1=(y,m)=>new Date(y,m-1,1).getDay();             // 0=domingo
const semanaDe=(y,m,d)=>Math.ceil((d+dowDia1(y,m))/7);       // domingo→sábado, acotada al mes
function diasDeSemana(y,m,sem){
  const n=diasMes(y,m), dw=dowDia1(y,m), out=[];
  for(let d=1;d<=n;d++) if(Math.ceil((d+dw)/7)===sem) out.push(d);
  return out;
}
function nSemanas(y,m){ return semanaDe(y,m,diasMes(y,m)); }
const estadoDe=p=>p==null?"SIN OBJETIVO":p>=1?"CUMPLE":p>=.85?"EN RIESGO":"NO CUMPLE";
const tagCls=e=>e==="CUMPLE"?"ok":e==="EN RIESGO"?"wr":e==="NO CUMPLE"?"no":"na";

function fechaExcel(v){
  if(v==null||v==="") return null;
  if(v instanceof Date && !isNaN(v)) return `${v.getFullYear()}-${p2(v.getMonth()+1)}-${p2(v.getDate())}`;
  if(typeof v==="number"){
    const d=new Date(Math.round((v-25569)*86400000));
    return isNaN(d)?null:`${d.getUTCFullYear()}-${p2(d.getUTCMonth()+1)}-${p2(d.getUTCDate())}`;
  }
  const s=String(v).trim();
  let m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m) return `${m[3]}-${p2(m[2])}-${p2(m[1])}`;
  m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);       if(m) return `${m[1]}-${p2(m[2])}-${p2(m[3])}`;
  const d=new Date(s);
  return isNaN(d)?null:`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
const partes=f=>({y:+f.slice(0,4),m:+f.slice(5,7),d:+f.slice(8,10)});

/* ══════════ exportar / importar ══════════ */
function bajarXLSX(filas,hoja,archivo,anchos){
  const ws=XLSX.utils.json_to_sheet(filas);
  if(anchos) ws["!cols"]=anchos.map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,hoja);
  XLSX.writeFile(wb,archivo);
}

/** Interpreta un mes escrito de varias formas: fecha de Excel, 2026-01, 01/2026, "enero 2026", "ene-26". */
function mesDesde(v){
  if(v==null||v==="") return null;
  if(v instanceof Date&&!isNaN(v)) return {y:v.getFullYear(),m:v.getMonth()+1};
  if(typeof v==="number"&&v>1000){
    const d=new Date(Math.round((v-25569)*86400000));
    if(!isNaN(d)) return {y:d.getUTCFullYear(),m:d.getUTCMonth()+1};
  }
  const s=String(v).trim().toLowerCase();
  let m=s.match(/^(\d{4})[-\/.](\d{1,2})/);            if(m) return {y:+m[1],m:+m[2]};
  m=s.match(/^(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/); if(m) return {y:+m[3],m:+m[2]};
  m=s.match(/^(\d{1,2})[-\/.](\d{4})$/);               if(m) return {y:+m[2],m:+m[1]};
  const i=MES_L.findIndex(x=>s.startsWith(x.slice(0,3)));
  if(i>=0){ const a=s.match(/(\d{2,4})/); if(a){ let y=+a[1]; if(y<100) y+=2000; return {y,m:i+1}; } }
  return null;
}

/** Lee un presupuesto desde .xlsx, .csv o .txt. Columnas: Mes | Sede | Objetivo (o Año + Mes + Sede + Objetivo). */
function leerPresupuesto(buf,nombre,mapa,suave){
  let filas;
  if(/\.(txt|csv|tsv)$/i.test(nombre)){
    const txt=new TextDecoder("utf-8").decode(buf);
    const wb=XLSX.read(txt,{type:"string",cellDates:true,raw:false});
    filas=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:null});
  }else{
    const wb=XLSX.read(buf,{type:"array",cellDates:true});
    const hoja=wb.SheetNames.find(n=>n.toLowerCase().includes("presupuesto"))||wb.SheetNames[0];
    filas=XLSX.utils.sheet_to_json(wb.Sheets[hoja],{defval:null});
  }
  if(!filas.length) throw new Error(`«${nombre}» no tiene filas.`);
  const k=Object.keys(filas[0]);
  const bus=(...t)=>k.find(x=>t.some(y=>x.toLowerCase().trim().includes(y)));
  const kMes=bus("mes","periodo","período","fecha");
  const kAnio=k.find(x=>/^(a[ñn]o|year)$/i.test(x.trim()));
  const kSede=bus("sede","tienda","almac");
  const kObj=bus("objetivo","presupuesto","meta","valor");
  if(!kSede) throw new Error("Falta la columna de sede. Debe llamarse «Sede».");
  if(!kObj)  throw new Error("Falta la columna del objetivo. Debe llamarse «Objetivo».");
  if(!kMes&&!kAnio) throw new Error("Falta la columna del mes. Debe llamarse «Mes».");

  const out={}; let leidas=0; const sinFecha=[];
  for(const r of filas){
    const sd=String(r[kSede]||"").trim(); if(!sd) continue;
    const n=Number(r[kObj]); if(!isFinite(n)) continue;
    let ym=kMes?mesDesde(r[kMes]):null;
    if(!ym&&kAnio&&kMes){
      const mm=Number(r[kMes]); const aa=Number(r[kAnio]);
      if(isFinite(mm)&&isFinite(aa)&&mm>=1&&mm<=12) ym={y:aa,m:mm};
    }
    if(!ym){ if(sinFecha.length<3) sinFecha.push(String(r[kMes])); continue; }
    const sede=buscarSede(sd,mapa,suave)||norm(sd);
    out[`${ym.y}-${p2(ym.m)}|${sede}`]=n; leidas++;
  }
  if(!leidas) throw new Error(`No pude leer ningún objetivo${sinFecha.length?`. No entendí el mes «${sinFecha[0]}»`:""}.`);
  return {presu:out,leidas};
}

/* ══════════ lectura de archivos ══════════ */
function leerHabeas(buf, mapa, suave){
  // 1) mirar solo los nombres de hoja (muy liviano)
  let hoja=null;
  try{
    const nombres=XLSX.read(buf,{type:"array",bookSheets:true}).SheetNames||[];
    hoja=nombres.find(n=>n.toLowerCase().includes("habeas"));
    if(!hoja){
      // 2) si no la encuentra por nombre, revisar solo los encabezados
      const peek=XLSX.read(buf,{type:"array",sheetRows:1});
      hoja=peek.SheetNames.find(n=>{
        const h=(XLSX.utils.sheet_to_json(peek.Sheets[n],{header:1})[0]||[]).map(x=>String(x||"").toLowerCase());
        return h.some(x=>x.includes("preferencia de ubicaci"));
      });
    }
  }catch(e){ throw new Error("No pude abrir el archivo: "+e.message); }
  if(!hoja) throw new Error("No encontré la hoja de Habeas Data. Debe tener la columna «Preferencia de ubicación».");

  // 3) leer SOLO esa hoja, en modo denso y sin convertir fechas (la mitad de memoria)
  let libro=XLSX.read(buf,{type:"array",dense:true,sheets:[hoja],cellStyles:false,cellNF:false,cellHTML:false});
  let filas=XLSX.utils.sheet_to_json(libro.Sheets[hoja],{header:1,defval:null,raw:true});
  libro=null;
  if(filas.length<2) throw new Error(`La hoja «${hoja}» no tiene registros.`);

  const enc=filas[0].map(x=>String(x||"").toLowerCase().trim());
  const iSede =enc.findIndex(x=>x.includes("preferencia de ubicaci"));
  const iFecha=enc.findIndex(x=>x.startsWith("updatedat"));
  const iAlt  =enc.findIndex(x=>x.startsWith("createdat"));
  const iNuevo=enc.findIndex(x=>x.includes("es cliente nuevo"));
  if(iSede<0)  throw new Error("Falta la columna «Preferencia de ubicación».");
  const iF = iFecha>=0?iFecha:iAlt;
  if(iF<0) throw new Error("Falta la columna de fecha («updatedAt» o «createdAt»).");

  // 4) recorrer y acumular; se guarda solo el resumen, no las 38.000 filas
  const acum=new Map(); const sinMapeo=new Set();
  let total=0,nuevos=0,descartados=0,invalidos=0;
  for(let i=1;i<filas.length;i++){
    const r=filas[i]; if(!r) continue;
    total++;
    if(iNuevo>=0){
      const v=r[iNuevo]; 
      if(v!=null && String(v).trim().toUpperCase()!=="NUEVO"){ descartados++; continue; }
    }
    const f=fechaExcel(r[iF]);
    const so=norm(r[iSede]);
    if(!f||!so||so==="NULL"){ invalidos++; continue; }
    nuevos++;
    const sede=buscarSede(so,mapa,suave); if(!sede) sinMapeo.add(so);
    const key=f+"|"+(sede||so);
    acum.set(key,(acum.get(key)||0)+1);
    filas[i]=null;                       // liberar la fila ya procesada
  }
  filas=null;
  if(!nuevos) throw new Error("No quedaron registros después de filtrar los clientes nuevos.");
  const rows=[...acum].map(([k,n])=>{const i=k.indexOf("|");return {f:k.slice(0,i),s:k.slice(i+1),n};});
  const corte=rows.reduce((a,r)=>r.f>a?r.f:a,"0000-00-00");
  return {rows,corte,total,nuevos,descartados,invalidos,sinMapeo:[...sinMapeo]};
}

function leerAnexo(buf, nombre, mapa, suave){
  const mf=nombre.match(/(\d{4})-(\d{2})-(\d{2})/);
  if(!mf) throw new Error(`«${nombre}»: el nombre del archivo no trae la fecha (se espera algo como reporte-registro-2026-07-22).`);
  const f=`${mf[1]}-${mf[2]}-${mf[3]}`;
  const wb=XLSX.read(buf,{type:"array",cellDates:true});
  const hoja=wb.SheetNames.find(n=>n.toLowerCase().includes("sede"))||wb.SheetNames[0];
  const filas=XLSX.utils.sheet_to_json(wb.Sheets[hoja],{defval:null});
  if(!filas.length) throw new Error(`«${nombre}»: la hoja está vacía.`);
  const k0=Object.keys(filas[0]);
  const kSede=k0.find(k=>k.toLowerCase().trim()==="sede")||k0[0];
  const kNum =k0.find(k=>k.toLowerCase().includes("registro"))||k0[1];
  const out=[]; const sinMapeo=new Set(); let tot=0;
  for(const r of filas){
    const so=norm(r[kSede]); const n=Number(r[kNum]);
    if(!so||!isFinite(n)||n<=0) continue;
    const sede=buscarSede(so,mapa,suave); if(!sede) sinMapeo.add(so);
    out.push({f,s:sede||so,n,src:nombre}); tot+=n;
  }
  if(!out.length) throw new Error(`«${nombre}»: no encontré filas con sede y cantidad.`);
  return {fecha:f,filas:out,total:tot,sinMapeo:[...sinMapeo]};
}

/* ══════════ cálculo ══════════ */
function useHechos(habeas,anexos,ignorar){
  return useMemo(()=>{
    const m=new Map();
    const add=(f,s,n,orig)=>{
      if(ignorar&&ignorar.has(s)) return;
      const k=f+"|"+s, a=m.get(k)||{f,s,n:0,hab:0,anx:0};
      a.n+=n; a[orig]+=n; m.set(k,a);
    };
    (habeas?.rows||[]).forEach(r=>add(r.f,r.s,r.n,"hab"));
    (anexos||[]).forEach(r=>add(r.f,r.s,r.n,"anx"));
    const rows=[...m.values()].sort((a,b)=>a.f<b.f?-1:a.f>b.f?1:a.s.localeCompare(b.s));
    const anios=[...new Set(rows.map(r=>+r.f.slice(0,4)))].sort();
    const sedes=[...new Set(rows.map(r=>r.s))].sort();
    return {rows,anios,sedes,
      corte:rows.reduce((a,r)=>r.f>a?r.f:a,null),
      totHab:rows.reduce((a,r)=>a+r.hab,0),
      totAnx:rows.reduce((a,r)=>a+r.anx,0)};
  },[habeas,anexos,ignorar]);
}

/** Construye la tabla de la vista pedida. */
function construirTabla(hechos,presu,mapa,cfgSedes,{vista,anio,mes,semana,dia}){
  const objMensual=(y,m,s)=>{const v=presu[`${y}-${p2(m)}|${s}`];return (v==null||v==="")?null:Number(v);};
  const objDiario =(y,m,s)=>{const o=objMensual(y,m,s);return o==null?null:o/diasMes(y,m);};

  // agrupar inscritos según la vista
  const ins=new Map(); // sede -> n
  for(const r of hechos.rows){
    const {y,m,d}=partes(r.f);
    if(y!==anio) continue;
    if(vista!=="anual" && m!==mes) continue;
    if(vista==="semanal" && semanaDe(y,m,d)!==semana) continue;
    if(vista==="diario"  && d!==dia) continue;
    ins.set(r.s,(ins.get(r.s)||0)+r.n);
  }
  // universo de sedes: las que tienen datos + las configuradas
  const universo=new Set([...ins.keys(),...cfgSedes]);
  const filas=[...universo].map(s=>{
    const inscritos=ins.get(s)||0;
    let objetivo=null, extra={};
    if(vista==="anual"){
      let t=0,hay=false;
      for(let m=1;m<=12;m++){const o=objMensual(anio,m,s); if(o!=null){t+=o;hay=true;}}
      objetivo=hay?t:null;
    } else if(vista==="mensual"){
      objetivo=objMensual(anio,mes,s);
      extra.diasMes=diasMes(anio,mes);
    } else if(vista==="semanal"){
      const od=objDiario(anio,mes,s), dd=diasDeSemana(anio,mes,semana);
      objetivo=od==null?null:od*dd.length;
      extra.dias=dd.length;
      extra.rango=dd.length?`${dd[0]}–${dd[dd.length-1]} ${MES_C[mes-1]}`:"—";
    } else {
      objetivo=objDiario(anio,mes,s);
      extra.dow=DOW[new Date(anio,mes-1,dia).getDay()];
    }
    const objR=objetivo==null?null:Math.round(objetivo);
    const p=(objR==null||objR===0)?null:inscritos/objR;
    return {sede:s,cluster:CLUSTER_BY_SEDE.get(s)||"Sin cluster",inscritos,objetivo:objR,
      faltante:objR==null?null:Math.max(0,objR-inscritos),
      pct:p,estado:estadoDe(p),...extra};
  }).filter(r=>r.inscritos>0||r.objetivo!=null);
  return filas;
}
let CLUSTER_BY_SEDE=new Map();

/* ══════════ gráfica de barras ══════════ */
function Barras({datos,labels,objetivo,titulo}){
  if(!datos.length) return <div className="empty"><p>Sin datos para graficar.</p></div>;
  // lienzo fijo que se estira al ancho de la tarjeta: la gráfica siempre llena el espacio
  const W=1000,H=290,pl=54,pr=16,pt=22,pb=34;
  const ch=H-pt-pb, bw=(W-pl-pr)/datos.length;
  const mx=Math.max(1,...datos,objetivo||0);
  const y=v=>pt+ch*(1-v/mx);
  const n=datos.length;
  const anchoBarra=Math.min(bw*.72,64);
  const cx=i=>pl+i*bw+bw/2;
  const paso = 1;   // mostrar siempre todas las etiquetas
  const fsL=n<=14?12:n<=24?11:10;
  return (
    <div className="cw">
      <svg viewBox={`0 0 ${W} ${H}`} width={W} height={H}
        style={{width:"100%",height:"auto",display:"block",maxWidth:"100%"}}
        role="img" aria-label={titulo||"Evolución"}>
        {[0,.25,.5,.75,1].map((t,i)=>(
          <g key={i}>
            <line x1={pl} x2={W-pr} y1={pt+ch*(1-t)} y2={pt+ch*(1-t)} stroke="#e6ece3" strokeWidth="1"/>
            <text x={pl-9} y={pt+ch*(1-t)+4} fontSize="11.5" fill="#8a9886" textAnchor="end">{fmt(mx*t)}</text>
          </g>
        ))}
        {datos.map((v,i)=>{
          const h=v>0?Math.max(ch*(v/mx),2.5):0;
          const ok=objetivo!=null&&v>=objetivo;
          return (
            <g key={i}>
              <rect x={cx(i)-anchoBarra/2} y={pt+ch-h} width={anchoBarra} height={h} rx="3"
                fill={ok?"#7dd105":"#1C5A2A"}>
                <title>{labels[i]}: {fmt(v)}{objetivo!=null?` · objetivo ${fmt(objetivo)}`:""}</title>
              </rect>
              {(i%paso===0||n<=16) &&
                <text x={cx(i)} y={H-pb+16} fontSize={fsL} fill="#63735f" textAnchor="middle">{labels[i]}</text>}
              {v>0 && n<=16 &&
                <text x={cx(i)} y={pt+ch-h-6} fontSize="11.5" fontWeight="700" fill="#05200b" textAnchor="middle">{fmt(v)}</text>}
            </g>
          );
        })}
        {objetivo!=null&&objetivo>0&&(
          <g>
            <line x1={pl} x2={W-pr} y1={y(objetivo)} y2={y(objetivo)} stroke="#b8342a" strokeWidth="2" strokeDasharray="7 5"/>
            <text x={W-pr-3} y={y(objetivo)-6} fontSize="11.5" fontWeight="700" fill="#b8342a" textAnchor="end">Objetivo {fmt(objetivo)}</text>
          </g>
        )}
      </svg>
    </div>
  );
}

/* ══════════ tabla de sedes ══════════ */
function TablaSedes({filas,vista}){
  const [sort,setSort]=useState({c:"pct",d:-1});
  const orden=useMemo(()=>{
    const a=[...filas];
    a.sort((x,y)=>{
      if(sort.c==="sede"||sort.c==="cluster") return sort.d*String(x[sort.c]).localeCompare(String(y[sort.c]));
      const vx=x[sort.c]==null?-Infinity:x[sort.c], vy=y[sort.c]==null?-Infinity:y[sort.c];
      return sort.d*(vx-vy);
    });
    return a;
  },[filas,sort]);
  const th=(c,l,cls="")=>(
    <th className={cls} onClick={()=>setSort(s=>({c,d:s.c===c?-s.d:-1}))}>
      {l}{sort.c===c?(sort.d===1?" ▲":" ▼"):""}
    </th>
  );
  const t=filas.reduce((a,f)=>({i:a.i+f.inscritos,o:a.o+(f.objetivo||0),fa:a.fa+(f.faltante||0)}),{i:0,o:0,fa:0});
  const tp=t.o>0?t.i/t.o:null;
  if(!filas.length) return <div className="empty"><h4>Nada que mostrar</h4><p>No hay inscritos ni objetivo en este período.</p></div>;
  return (
    <div className="tw">
      <table>
        <thead><tr>
          {th("sede","Sede")}
          {th("cluster","Cluster")}
          {vista==="semanal" && <th>Rango</th>}
          {vista==="diario"  && <th>Día</th>}
          {th("inscritos","Inscritos","r")}
          {th("objetivo","Objetivo","r")}
          {th("faltante","Faltan","r")}
          {th("pct","% Cumplimiento","r")}
          <th>Estado</th>
        </tr></thead>
        <tbody>
          {orden.map(f=>(
            <tr key={f.sede}>
              <td style={{fontWeight:600}}>{f.sede}</td>
              <td style={{color:"var(--muted)"}}>{f.cluster}</td>
              {vista==="semanal" && <td style={{color:"var(--muted)"}}>{f.rango}</td>}
              {vista==="diario"  && <td style={{color:"var(--muted)"}}>{f.dow}</td>}
              <td className="r num">{fmt(f.inscritos)}</td>
              <td className="r num">{fmt(f.objetivo)}</td>
              <td className="r num" style={{color:f.faltante>0?"var(--red)":"var(--muted-2)",fontWeight:f.faltante>0?600:400}}>
                {f.faltante==null?"—":f.faltante===0?"✓":fmt(f.faltante)}
              </td>
              <td className="r">
                <div className="pb">
                  <span className="trk"><i className={f.pct>=1?"":f.pct>=.85?"wr":"no"} style={{width:Math.min(100,(f.pct||0)*100)+"%"}}/></span>
                  <b className="num" style={{minWidth:50,textAlign:"right"}}>{pct(f.pct)}</b>
                </div>
              </td>
              <td><span className={"tag "+tagCls(f.estado)}>{f.estado}</span></td>
            </tr>
          ))}
          <tr className="tot">
            <td>TOTAL</td><td>{filas.length} sedes</td>
            {vista==="semanal" && <td/>}{vista==="diario" && <td/>}
            <td className="r num">{fmt(t.i)}</td>
            <td className="r num">{fmt(t.o)}</td>
            <td className="r num">{t.fa>0?fmt(t.fa):"✓"}</td>
            <td className="r num">{pct(tp)}</td>
            <td><span className={"tag "+tagCls(estadoDe(tp))}>{estadoDe(tp)}</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  );
}

/* ══════════ pestaña DATOS ══════════ */
function Datos({habeas,anexos,mapa,suave,onHabeas,onAnexos,onMemoria,memoria,notify,hechos,setTab,usarAnexos,setUsarAnexos,guardaLocal,onLimpiar}){

  const [err,setErr]=useState(null);
  const rH=useRef(),rA=useRef(),rM=useRef();

  const [leyendo,setLeyendo]=useState(false);
  const cargarHabeas=file=>{
    setErr(null); setLeyendo(true);
    notify("Leyendo la base, puede tardar unos segundos…");
    const fr=new FileReader();
    fr.onload=e=>{ setTimeout(()=>{
      let buf=new Uint8Array(e.target.result);
      try{
        const r=leerHabeas(buf,mapa,suave);
        buf=null; e.target.value=null;
        onHabeas({corte:r.corte,rows:r.rows,archivo:file.name,
          stats:{total:r.total,nuevos:r.nuevos,descartados:r.descartados,invalidos:r.invalidos},
          sinMapeo:r.sinMapeo});
        notify(`Habeas Data: ${r.nuevos.toLocaleString("es-CO")} clientes nuevos${r.descartados?` · ${r.descartados.toLocaleString("es-CO")} actualizaciones descartadas`:""}`);
      }catch(x){
        setErr(x&&x.message?x.message:"No pude procesar el archivo. Puede ser demasiado grande para este equipo.");
      }finally{ setLeyendo(false); }
    },40); };
    fr.onerror=()=>{ setErr("No pude leer el archivo."); setLeyendo(false); };
    fr.readAsArrayBuffer(file);
  };

  const cargarAnexos=files=>{
    setErr(null);
    const lista=[...files]; let hechas=0, nuevas=[], errores=[], sm=new Set();
    lista.forEach(file=>{
      const fr=new FileReader();
      fr.onload=e=>{
        try{
          const r=leerAnexo(new Uint8Array(e.target.result),file.name,mapa,suave);
          nuevas.push(...r.filas); r.sinMapeo.forEach(s=>sm.add(s));
        }catch(x){ errores.push(x.message); }
        if(++hechas===lista.length) cerrar();
      };
      fr.onerror=()=>{ errores.push(`No pude leer «${file.name}».`); if(++hechas===lista.length) cerrar(); };
      fr.readAsArrayBuffer(file);
    });
    function cerrar(){
      if(nuevas.length){
        const res=onAnexos(nuevas);
        notify(`${res.agregados} registros agregados${res.repetidos?` · ${res.repetidos} ya estaban y se ignoraron`:""}`);
      }
      if(errores.length) setErr(errores.join("  "));
      if(sm.size) setErr(p=>(p?p+"  ":"")+`Sedes sin mapear: ${[...sm].join(", ")}. Agrégalas en Configuración.`);
    }
  };

  const cargarMemoria=file=>{
    setErr(null);
    const fr=new FileReader();
    fr.onload=e=>{
      try{
        const j=JSON.parse(e.target.result);
        if(j.tipo!=="memoria_clientes_nuevos") throw new Error("Ese archivo no es una memoria de esta app.");
        onMemoria(j);
        notify("Memoria cargada");
      }catch(x){ setErr("No pude leer la memoria: "+x.message); }
    };
    fr.readAsText(file);
  };

  const dz=(id,tit,txt,btn,onFile,multi)=>(
    <div className={"dz"+(drag===id?" hot":"")}
      onDragOver={e=>{e.preventDefault();setDrag(id);}}
      onDragLeave={()=>setDrag(null)}
      onDrop={e=>{e.preventDefault();setDrag(null);if(e.dataTransfer.files.length)onFile(multi?e.dataTransfer.files:e.dataTransfer.files[0]);}}>
      <h4>{tit}</h4><p>{txt}</p>
      <button className="btn" disabled={leyendo}
        onClick={()=>({h:rH,a:rA,m:rM})[id].current.click()}>{leyendo?"Leyendo…":btn}</button>
    </div>
  );

  const anexosPorFecha=useMemo(()=>{
    const m=new Map();
    (anexos||[]).forEach(a=>m.set(a.f,(m.get(a.f)||0)+a.n));
    return [...m].sort((a,b)=>b[0]<a[0]?-1:1);
  },[anexos]);

  return (
    <div>
      <input ref={rH} type="file" accept=".xlsx,.xls" style={{display:"none"}}
        onChange={e=>{if(e.target.files[0])cargarHabeas(e.target.files[0]);e.target.value="";}}/>
      <input ref={rA} type="file" accept=".xlsx,.xls" multiple style={{display:"none"}}
        onChange={e=>{if(e.target.files.length)cargarAnexos(e.target.files);e.target.value="";}}/>
      <input ref={rM} type="file" accept=".json" style={{display:"none"}}
        onChange={e=>{if(e.target.files[0])cargarMemoria(e.target.files[0]);e.target.value="";}}/>

      {err && <div className="note e">{err}</div>}

      <div className="card">
        <h3>Memoria</h3>
        <div className="hint">Un archivo con todo lo acumulado: los anexos diarios, el presupuesto y la configuración de sedes. Cárgalo al empezar y guárdalo al terminar.</div>
        <div className="row">
          <button className="btn lime" onClick={memoria}>Guardar memoria</button>
          <button className="btn gh" onClick={()=>rM.current.click()}>Cargar memoria</button>
          <button className="btn gh dg sm" onClick={onLimpiar} style={{marginLeft:"auto"}}>Borrar todo</button>
        </div>
        <div className="note i" style={{marginTop:12,marginBottom:0}}>
          {guardaLocal
            ? "Lo que cargues queda guardado en este equipo, así que si refrescas la página no pierdes nada. Aun así guarda la memoria para llevártela a otro computador o respaldarla."
            : "Este navegador no permite guardar en el equipo: si refrescas la página se pierde lo cargado. Guarda la memoria antes de cerrar."}
        </div>
      </div>

      <div className="card">
        <h3>Habeas Data</h3>
        <div className="hint">La base completa de clientes. Cada vez que la subas <b>reemplaza</b> la anterior, así que siempre sube la versión más reciente. Solo se cuentan los clientes nuevos; las actualizaciones se descartan solas.</div>
        {habeas ? (
          <div className="src ok">
            <span className="dot"/>
            <div>
              <div className="t">{habeas.archivo||"Base cargada"}</div>
              <div className="d">Corte {habeas.corte} · {habeas.stats?.descartados?`${fmt(habeas.stats.descartados)} actualizaciones descartadas`:"sin actualizaciones"}</div>
            </div>
            <div className="r"><b className="num">{fmt(habeas.stats?.nuevos)}</b><div className="d">clientes nuevos</div></div>
          </div>
        ) : dz("h","Sube la base de Habeas Data","Arrastra el .xlsx o búscalo. Se lee la hoja «Habeas Data».","Buscar archivo",cargarHabeas,false)}
        {habeas && <div className="row" style={{marginTop:10}}>
          <button className="btn gh sm" disabled={leyendo} onClick={()=>rH.current.click()}>{leyendo?"Leyendo…":"Reemplazar base"}</button>
        </div>}
        {habeas?.sinMapeo?.length>0 &&
          <div className="note w" style={{marginTop:12,marginBottom:0}}>
            Sedes sin mapear: {habeas.sinMapeo.join(", ")}. Ve a Configuración para asignarles nombre y cluster.
          </div>}
      </div>

      <div className="card">
        <h3>Reportes diarios</h3>
        <div className="hint">Los archivos que llegan día a día ya sumados por sede. Se acumulan en la memoria y se suman a la base. Si subes uno repetido, se ignora. La fecha se toma del nombre del archivo.</div>
        {dz("a","Sube los reportes diarios","Puedes arrastrar varios a la vez. Ejemplo: reporte-registro-2026-07-22.xlsx","Buscar archivos",cargarAnexos,true)}
        {anexosPorFecha.length>0 && (
          <div style={{marginTop:14}}>
            <div className="note w" style={{marginBottom:12}}>
              <label style={{display:"flex",gap:9,alignItems:"flex-start",cursor:"pointer"}}>
                <input type="checkbox" checked={usarAnexos} onChange={e=>setUsarAnexos(e.target.checked)}
                  style={{marginTop:2,width:16,height:16,accentColor:"#1C5A2A",flexShrink:0}}/>
                <span><b>Sumar los reportes diarios al Habeas Data.</b> Desmárcalo si estos registros ya vienen incluidos
                en la base: dejarlo marcado en ese caso hace que los números salgan más altos de lo real.
                Compara un mismo día con y sin la marca para saber cuál es tu caso.</span>
              </label>
            </div>
            <div className="eyebrow" style={{marginBottom:8}}>{anexosPorFecha.length} días cargados · {fmt(anexos.reduce((a,x)=>a+x.n,0))} registros{usarAnexos?"":" (sin sumar)"}</div>
            <div className="tw" style={{maxHeight:230,overflowY:"auto"}}>
              <table>
                <thead><tr><th>Fecha</th><th className="r">Registros</th></tr></thead>
                <tbody>{anexosPorFecha.map(([f,n])=>(
                  <tr key={f}><td>{f}</td><td className="r num">{fmt(n)}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {(habeas||anexos?.length>0) && (
        <div className="card">
          <h3>Consolidado</h3>
          <div className="hint">Lo que alimenta el dashboard.</div>
          <div className="kpis" style={{marginBottom:0}}>
            <div className="kpi"><div className="bar"/><div className="lb">Habeas Data</div><div className="vl num">{fmt(hechos.totHab)}</div></div>
            <div className="kpi"><div className="bar"/><div className="lb">Reportes diarios</div><div className="vl num">{fmt(hechos.totAnx)}</div></div>
            <div className="kpi dark"><div className="lb">Total consolidado</div><div className="vl num">{fmt(hechos.totHab+hechos.totAnx)}</div>
              <div className="dt">Corte {hechos.corte||"—"}</div></div>
          </div>
          <div className="row" style={{marginTop:14}}>
            <button className="btn" onClick={()=>setTab("dash")}>Ver el dashboard</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════ pestaña DASHBOARD ══════════ */
function Dashboard({hechos,presu,mapa,cfgSedes,capturando}){
  const hoy=new Date();
  const aniosDisp=hechos.anios.length?hechos.anios:[hoy.getFullYear()];
  const [vista,setVista]=useState("mensual");
  const [anio,setAnio]=useState(aniosDisp[aniosDisp.length-1]);
  const [mes,setMes]=useState(()=>hechos.corte?+hechos.corte.slice(5,7):hoy.getMonth()+1);
  const [semana,setSemana]=useState(1);
  const [dia,setDia]=useState(()=>hechos.corte?+hechos.corte.slice(8,10):1);
  const [cluster,setCluster]=useState("TODOS");
  const [sedeSel,setSedeSel]=useState("TODAS");

  useEffect(()=>{ if(!aniosDisp.includes(anio)) setAnio(aniosDisp[aniosDisp.length-1]); },[hechos.anios.join()]);
  const nSem=nSemanas(anio,mes);
  const nDia=diasMes(anio,mes);
  useEffect(()=>{ if(semana>nSem) setSemana(nSem); if(dia>nDia) setDia(nDia); },[anio,mes]);

  const filasTodas=useMemo(()=>construirTabla(hechos,presu,mapa,cfgSedes,{vista,anio,mes,semana,dia}),
    [hechos,presu,mapa,cfgSedes,vista,anio,mes,semana,dia]);
  const filas=useMemo(()=>{
    let f=filasTodas;
    if(cluster!=="TODOS") f=f.filter(x=>x.cluster===cluster);
    if(sedeSel!=="TODAS") f=f.filter(x=>x.sede===sedeSel);
    return f;
  },[filasTodas,cluster,sedeSel]);

  const sedesDisp=useMemo(()=>{
    const f=cluster==="TODOS"?filasTodas:filasTodas.filter(x=>x.cluster===cluster);
    return [...new Set(f.map(x=>x.sede))].sort();
  },[filasTodas,cluster]);
  useEffect(()=>{ if(sedeSel!=="TODAS"&&!sedesDisp.includes(sedeSel)) setSedeSel("TODAS"); },[sedesDisp.join()]);

  const k=useMemo(()=>{
    const i=filas.reduce((a,f)=>a+f.inscritos,0);
    const o=filas.reduce((a,f)=>a+(f.objetivo||0),0);
    const fa=filas.reduce((a,f)=>a+(f.faltante||0),0);
    const conObj=filas.filter(f=>f.objetivo!=null).length;
    const cum=filas.filter(f=>f.pct!=null&&f.pct>=1).length;
    return {i,o,fa,conObj,cum,p:o>0?i/o:null};
  },[filas]);

  // serie para la gráfica
  const graf=useMemo(()=>{
    const sedesSet=new Set(filas.map(f=>f.sede));
    const sum=fn=>{
      const m=new Map();
      for(const r of hechos.rows){
        const {y,m:mm,d}=partes(r.f);
        if(y!==anio||!sedesSet.has(r.s)) continue;
        const k=fn(y,mm,d); if(k==null) continue;
        m.set(k,(m.get(k)||0)+r.n);
      }
      return m;
    };
    const objTot=(fnObj)=>{
      let t=0,hay=false;
      filas.forEach(f=>{const o=fnObj(f); if(o!=null){t+=o;hay=true;}});
      return hay?t:null;
    };
    if(vista==="anual"||vista==="mensual"){
      const m=sum((y,mm)=>mm);
      const objMes=mm=>objTot(f=>{const v=presu[`${anio}-${p2(mm)}|${f.sede}`];return (v==null||v==="")?null:Number(v);});
      return {datos:Array.from({length:12},(_,i)=>m.get(i+1)||0),
        labels:MES_C, objetivo:vista==="mensual"?objMes(mes):null,
        titulo:`Inscritos por mes · ${anio}`};
    }
    if(vista==="semanal"){
      const m=sum((y,mm,d)=>mm===mes?semanaDe(y,mm,d):null);
      return {datos:Array.from({length:nSem},(_,i)=>m.get(i+1)||0),
        labels:Array.from({length:nSem},(_,i)=>"S"+(i+1)),
        objetivo:k.o||null, titulo:`Inscritos por semana · ${MES_L[mes-1]} ${anio}`};
    }
    const m=sum((y,mm,d)=>mm===mes?d:null);
    return {datos:Array.from({length:nDia},(_,i)=>m.get(i+1)||0),
      labels:Array.from({length:nDia},(_,i)=>i+1),
      objetivo:k.o||null, titulo:`Inscritos por día · ${MES_L[mes-1]} ${anio}`};
  },[hechos,filas,vista,anio,mes,nSem,nDia,presu,k.o]);

  const sinPresu=filas.length>0 && filas.every(f=>f.objetivo==null);
  const per = vista==="anual"?String(anio)
    : vista==="mensual"?`${MES_L[mes-1]} ${anio}`
    : vista==="semanal"?`semana ${semana} de ${MES_L[mes-1]}`
    : `${dia} de ${MES_L[mes-1]}`;

  const exportar=()=>{
    const t=filas.reduce((a,f)=>({i:a.i+f.inscritos,o:a.o+(f.objetivo||0),fa:a.fa+(f.faltante||0)}),{i:0,o:0,fa:0});
    const tp=t.o>0?t.i/t.o:null;
    const fila=f=>{
      const o={Sede:f.sede,Cluster:f.cluster};
      if(vista==="semanal") o["Rango"]=f.rango;
      if(vista==="diario")  o["Día"]=f.dow;
      o["Inscritos"]=f.inscritos;
      o["Objetivo"]=f.objetivo;
      o["Faltan"]=f.faltante;
      o["% Cumplimiento"]=f.pct==null?null:Math.round(f.pct*1000)/10;
      o["Estado"]=f.estado;
      return o;
    };
    const datos=[...filas].sort((a,b)=>(b.pct??-1)-(a.pct??-1)).map(fila);
    const tot={Sede:"TOTAL",Cluster:`${filas.length} sedes`};
    if(vista==="semanal") tot["Rango"]="";
    if(vista==="diario")  tot["Día"]="";
    tot["Inscritos"]=t.i; tot["Objetivo"]=t.o; tot["Faltan"]=t.fa;
    tot["% Cumplimiento"]=tp==null?null:Math.round(tp*1000)/10;
    tot["Estado"]=estadoDe(tp);
    datos.push(tot);
    const et=(vista==="anual"?`anual_${anio}`
      : vista==="mensual"?`${MES_C[mes-1]}${anio}`
      : vista==="semanal"?`${MES_C[mes-1]}${anio}_sem${semana}`
      : `${anio}-${p2(mes)}-${p2(dia)}`).toLowerCase();
    const sf=sedeSel!=="TODAS"?"_"+sedeSel.replace(/\s+/g,"_").toLowerCase():"";
    bajarXLSX(datos,"Cumplimiento",`clientes_nuevos_${et}${sf}.xlsx`,[30,22,14,12,12,12,16,14]);
  };

  const alcance = sedeSel!=="TODAS" ? sedeSel : cluster!=="TODOS" ? cluster : "Todas las sedes";

  return (
    <div>
      <div className="cap-h">
        <img src={LOGO} alt="Supertiendas Cañaveral"/>
        <div className="s"/>
        <div>
          <h2>Clientes nuevos · {per}</h2>
          <div className="p">{alcance} · {vista==="anual"?"acumulado del año":vista==="mensual"?"mes completo":vista==="semanal"?"semana":"día"}</div>
        </div>
        <div className="f">
          Generado el {new Date().toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"})}
          <br/>Datos con corte {hechos.corte||"—"}
        </div>
      </div>
      <div className="ctrls">
        <div className="ct">
          <label>Vista</label>
          <div className="seg">
            {[["anual","Anual"],["mensual","Mensual"],["semanal","Semanal"],["diario","Día"]].map(([v,l])=>
              <button key={v} className={vista===v?"on":""} onClick={()=>setVista(v)}>{l}</button>)}
          </div>
        </div>
        <div className="ct"><label>Año</label>
          <select value={anio} onChange={e=>setAnio(+e.target.value)}>
            {aniosDisp.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        {vista!=="anual" && (
          <div className="ct"><label>Mes</label>
            <select value={mes} onChange={e=>setMes(+e.target.value)}>
              {MES_L.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
            </select>
          </div>
        )}
        {vista==="semanal" && (
          <div className="ct"><label>Semana</label>
            <select value={semana} onChange={e=>setSemana(+e.target.value)}>
              {Array.from({length:nSem},(_,i)=>{
                const d=diasDeSemana(anio,mes,i+1);
                return <option key={i+1} value={i+1}>Semana {i+1} · {d[0]}–{d[d.length-1]}</option>;
              })}
            </select>
          </div>
        )}
        {vista==="diario" && (
          <div className="ct"><label>Día</label>
            <select value={dia} onChange={e=>setDia(+e.target.value)}>
              {Array.from({length:nDia},(_,i)=>(
                <option key={i+1} value={i+1}>{i+1} · {DOW[new Date(anio,mes-1,i+1).getDay()]}</option>
              ))}
            </select>
          </div>
        )}
        <div className="ct"><label>Cluster</label>
          <select value={cluster} onChange={e=>setCluster(e.target.value)}>
            <option value="TODOS">Todos</option>
            {[...new Set(filasTodas.map(f=>f.cluster))].sort().map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="ct"><label>Sede</label>
          <select value={sedeSel} onChange={e=>setSedeSel(e.target.value)}>
            <option value="TODAS">Todas las sedes</option>
            {sedesDisp.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <button className="btn gh" onClick={exportar} disabled={!filas.length}>Exportar a Excel</button>
      </div>

      {sinPresu && <div className="note w">Este período no tiene presupuesto cargado, por eso el cumplimiento aparece en blanco. Ve a Presupuesto para definirlo.</div>}

      <div className="kpis">
        <div className="kpi dark"><div className="lb">Inscritos</div><div className="vl num">{fmt(k.i)}</div>
          <div className="dt">{per}</div></div>
        <div className="kpi"><div className="bar"/><div className="lb">Objetivo</div><div className="vl num">{fmt(k.o)}</div>
          <div className="dt">{sedeSel!=="TODAS"?sedeSel:cluster==="TODOS"?`${filas.length} sedes`:cluster}</div></div>
        <div className="kpi"><div className="lb">Faltan</div>
          <div className="vl num" style={{color:k.fa>0?"var(--red)":"var(--forest)"}}>{k.fa>0?fmt(k.fa):"0"}</div>
          <div className="dt">{k.fa>0?"para llegar al objetivo":"objetivo alcanzado"}</div></div>
        <div className="kpi"><div className="lb">% Cumplimiento</div>
          <div className="vl num" style={{color:k.p==null?"var(--muted-2)":k.p>=1?"var(--forest)":"var(--red)"}}>{pct(k.p)}</div>
          <div className="dt">{estadoDe(k.p)}</div></div>
        <div className="kpi"><div className="lb">Sedes que cumplen</div>
          <div className="vl num">{k.cum}<span style={{fontSize:15,color:"var(--muted-2)"}}> / {k.conObj}</span></div>
          <div className="dt">con objetivo definido</div></div>
      </div>

      <div className="card">
        <h3>{graf.titulo}</h3>
        <div className="hint">{sedeSel!=="TODAS"?sedeSel:cluster==="TODOS"?"Todas las sedes":cluster}</div>
        <Barras {...graf}/>
        <div className="lg">
          <span><span className="sw" style={{background:"var(--forest)"}}/>Inscritos</span>
          {graf.objetivo!=null && <span><span className="sw" style={{background:"var(--lime)"}}/>Alcanza el objetivo</span>}
          {graf.objetivo!=null && <span><span className="sw" style={{background:"var(--red)",height:3}}/>Objetivo del período</span>}
        </div>
      </div>

      <div className="card">
        <h3>{sedeSel!=="TODAS"?`Cumplimiento · ${sedeSel}`:"Cumplimiento por sede"}</h3>
        <div className="hint">
          {vista==="anual"   && "Objetivo anual = suma de los 12 objetivos mensuales."}
          {vista==="mensual" && `Objetivo del mes completo (${diasMes(anio,mes)} días).`}
          {vista==="semanal" && "Objetivo semanal = objetivo diario × días de esa semana dentro del mes."}
          {vista==="diario"  && `Objetivo diario = objetivo mensual ÷ ${diasMes(anio,mes)} días.`}
          {" "}Toca un encabezado para ordenar.
        </div>
        <TablaSedes filas={filas} vista={vista}/>
      </div>
    </div>
  );
}

/* ══════════ pestaña PRESUPUESTO ══════════ */
function Presupuesto({presu,setPresu,cfgSedes,anios,notify,mapa,suave}){
  const hoy=new Date();
  const rP=useRef();
  const [err,setErr]=useState(null);
  const listaAnios=useMemo(()=>{
    const s=new Set(anios);
    Object.keys(presu).forEach(k=>s.add(+k.slice(0,4)));
    s.add(hoy.getFullYear()); s.add(hoy.getFullYear()+1);
    return [...s].sort();
  },[anios,presu]);
  const [anio,setAnio]=useState(hoy.getFullYear());
  const [mes,setMes]=useState(hoy.getMonth()+1);
  const key=s=>`${anio}-${p2(mes)}|${s}`;
  const set=(s,v)=>setPresu(p=>{
    const n={...p};
    if(v===""||v==null) delete n[key(s)]; else n[key(s)]=Number(v);
    return n;
  });
  const total=cfgSedes.reduce((a,s)=>a+(Number(presu[key(s)])||0),0);
  const copiarMesAnterior=()=>{
    const pm=mes===1?12:mes-1, pa=mes===1?anio-1:anio;
    const n={...presu}; let c=0;
    cfgSedes.forEach(s=>{
      const v=presu[`${pa}-${p2(pm)}|${s}`];
      if(v!=null&&v!==""){ n[key(s)]=v; c++; }
    });
    if(!c){ notify(`${MES_L[pm-1]} ${pa} no tiene presupuesto para copiar`); return; }
    setPresu(n); notify(`Copiado de ${MES_L[pm-1]} ${pa}`);
  };
  const aplicarTodoElAnio=()=>{
    const n={...presu}; let c=0;
    cfgSedes.forEach(s=>{
      const v=presu[key(s)];
      if(v!=null&&v!==""){ for(let m=1;m<=12;m++){ n[`${anio}-${p2(m)}|${s}`]=v; } c++; }
    });
    if(!c){ notify("Primero escribe los objetivos de este mes"); return; }
    setPresu(n); notify(`Aplicado a los 12 meses de ${anio}`);
  };
  const limpiar=()=>{
    setPresu(p=>{const n={...p};cfgSedes.forEach(s=>delete n[key(s)]);return n;});
    notify("Mes vaciado");
  };

  const descargar=()=>{
    if(!cfgSedes.length){ notify("Primero configura las sedes"); return; }
    const filas=[];
    for(let m=1;m<=12;m++)
      cfgSedes.forEach(s=>{
        const v=presu[`${anio}-${p2(m)}|${s}`];
        filas.push({Mes:`${anio}-${p2(m)}`,Sede:s,Objetivo:(v==null||v==="")?0:Number(v)});
      });
    bajarXLSX(filas,"Presupuesto",`presupuesto_${anio}.xlsx`,[12,32,12]);
    notify(`Presupuesto de ${anio} descargado · edítalo y vuélvelo a subir`);
  };

  const cargar=file=>{
    setErr(null);
    const fr=new FileReader();
    fr.onload=e=>{
      try{
        const r=leerPresupuesto(new Uint8Array(e.target.result),file.name,mapa,suave);
        setPresu(p=>({...p,...r.presu}));
        notify(`${r.leidas} objetivos cargados de «${file.name}»`);
      }catch(x){ setErr(x.message); }
    };
    fr.onerror=()=>setErr("No pude leer el archivo.");
    fr.readAsArrayBuffer(file);
  };
  return (
    <div className="card">
      <h3>Presupuesto mensual por sede</h3>
      <div className="hint">Lo define el área encargada. Escribes solo el objetivo del mes; el diario, el semanal y el anual se calculan solos. También puedes descargarlo en Excel, editarlo allá y volverlo a subir.</div>
      <input ref={rP} type="file" accept=".xlsx,.xls,.csv,.txt" style={{display:"none"}}
        onChange={e=>{if(e.target.files[0])cargar(e.target.files[0]);e.target.value="";}}/>
      {err && <div className="note e">{err}</div>}
      <div className="row" style={{marginBottom:14}}>
        <button className="btn lime" onClick={()=>rP.current.click()}>Subir presupuesto</button>
        <button className="btn gh" onClick={descargar}>Descargar Excel</button>
        <span style={{fontSize:12,color:"var(--muted)"}}>
          El archivo debe tener las columnas <b>Mes</b>, <b>Sede</b> y <b>Objetivo</b>. Acepta .xlsx, .csv y .txt.
        </span>
      </div>
      <div className="ctrls" style={{marginBottom:14}}>
        <div className="ct"><label>Año</label>
          <select value={anio} onChange={e=>setAnio(+e.target.value)}>
            {listaAnios.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </div>
        <div className="ct"><label>Mes</label>
          <select value={mes} onChange={e=>setMes(+e.target.value)}>
            {MES_L.map((m,i)=><option key={i} value={i+1}>{m}</option>)}
          </select>
        </div>
        <button className="btn gh sm" onClick={copiarMesAnterior}>Copiar del mes anterior</button>
        <button className="btn gh sm" onClick={aplicarTodoElAnio}>Aplicar a todo {anio}</button>
        <button className="btn gh sm dg" onClick={limpiar}>Vaciar mes</button>
        <div style={{marginLeft:"auto",fontWeight:700,fontSize:13}}>
          Objetivo del mes: <span className="num" style={{color:"var(--forest)"}}>{fmt(total)}</span>
        </div>
      </div>
      {cfgSedes.length===0
        ? <div className="empty"><h4>Todavía no hay sedes</h4><p>Agrégalas en Configuración o carga la base de Habeas Data.</p></div>
        : <div className="pg">
            {cfgSedes.map(s=>(
              <div className="pr" key={s}>
                <span className="nm" title={s}>{s}</span>
                <input type="number" min="0" inputMode="numeric" placeholder="0"
                  aria-label={"Objetivo de "+s}
                  value={presu[key(s)]??""} onChange={e=>set(s,e.target.value)}/>
              </div>
            ))}
          </div>}
    </div>
  );
}

/* ══════════ pestaña CONFIGURACIÓN ══════════ */
function Config({mapeo,setMapeo,notify}){
  const [nuevo,setNuevo]=useState({origen:"",sede:"",cluster:"Prime choice"});
  const upd=(i,c,v)=>setMapeo(m=>m.map((x,j)=>j===i?{...x,[c]:v}:x));
  const del=i=>setMapeo(m=>m.filter((_,j)=>j!==i));
  const add=()=>{
    const o=norm(nuevo.origen), s=nuevo.sede.trim().toUpperCase();
    if(!o||!s){ notify("Escribe cómo llega la sede y su nombre real"); return; }
    setMapeo(m=>[...m,{origen:o,sede:s,cluster:nuevo.cluster}]);
    setNuevo({origen:"",sede:"",cluster:nuevo.cluster});
    notify("Sede agregada");
  };
  return (
    <div>
      <div className="card">
        <h3>Sedes</h3>
        <div className="hint">Traduce el nombre que llega en los archivos al nombre real que ves en el dashboard, y le asigna su cluster. Una misma sede puede tener varias formas de llegar: agrega una fila por cada una.</div>
        <div className="mp mph"><div>Como llega en el archivo</div><div>Nombre real</div><div>Cluster</div><div/></div>
        {mapeo.map((m,i)=>(
          <div className="mp" key={i}>
            <input value={m.origen} onChange={e=>upd(i,"origen",e.target.value)} aria-label="Nombre de origen"/>
            <input value={m.sede} onChange={e=>upd(i,"sede",e.target.value)} aria-label="Nombre real"/>
            <select value={m.cluster} onChange={e=>upd(i,"cluster",e.target.value)} aria-label="Cluster">
              {CLUSTERS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <button className="x" onClick={()=>del(i)} title="Quitar" aria-label={"Quitar "+m.sede}>×</button>
          </div>
        ))}
        <div className="mp" style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--line)"}}>
          <input placeholder="CALI-NUEVA SEDE" value={nuevo.origen}
            onChange={e=>setNuevo(n=>({...n,origen:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&add()} aria-label="Nueva sede de origen"/>
          <input placeholder="SC NUEVA SEDE" value={nuevo.sede}
            onChange={e=>setNuevo(n=>({...n,sede:e.target.value}))}
            onKeyDown={e=>e.key==="Enter"&&add()} aria-label="Nuevo nombre real"/>
          <select value={nuevo.cluster} onChange={e=>setNuevo(n=>({...n,cluster:e.target.value}))} aria-label="Cluster nuevo">
            {CLUSTERS.map(c=><option key={c} value={c}>{c}</option>)}
          </select>
          <button className="btn sm" onClick={add} style={{width:"auto",padding:"6px 10px"}}>Agregar</button>
        </div>
      </div>
      <div className="card">
        <h3>Cómo se calcula</h3>
        <div className="hint" style={{marginBottom:0,lineHeight:1.8}}>
          <b>Objetivo diario</b> = objetivo mensual ÷ días del mes<br/>
          <b>Objetivo semanal</b> = objetivo diario × días de esa semana que caen dentro del mes (la semana va de domingo a sábado)<br/>
          <b>Objetivo anual</b> = suma de los 12 objetivos mensuales<br/>
          <b>Estados</b>: cumple desde 100% · en riesgo entre 85% y 99% · no cumple por debajo de 85%
        </div>
      </div>
    </div>
  );
}

/* ══════════ guardado local automático ══════════ */
const LS="cn_estado_v1";
function leerLocal(){
  try{ const t=window.localStorage.getItem(LS); return t?JSON.parse(t):null; }catch(e){ return null; }
}
function escribirLocal(o){
  try{ window.localStorage.setItem(LS,JSON.stringify(o)); return true; }catch(e){ return false; }
}
function borrarLocal(){ try{ window.localStorage.removeItem(LS); }catch(e){} }

/* ══════════ APP ══════════ */
function App(){
  const ini=useRef(leerLocal()).current;
  const [habeas,setHabeas]=useState(ini?.habeas??null);
  const [anexos,setAnexos]=useState(ini?.anexos??[]);
  const [presu,setPresu]=useState(ini?.presupuesto??{});
  const [mapeo,setMapeo]=useState(ini?.mapeo?.length?migrarMapeo(ini.mapeo):MAPEO_INI);
  const [usarAnexos,setUsarAnexos]=useState(ini?.usarAnexos??true);
  const [toast,setToast]=useState(null);
  const tRef=useRef();

  const notify=useCallback(m=>{
    setToast(m); clearTimeout(tRef.current);
    tRef.current=setTimeout(()=>setToast(null),3200);
  },[]);

  const {mapa,suave,ignorar}=useMemo(()=>{
    const m=new Map(), sv=new Map(), ig=new Set(); CLUSTER_BY_SEDE=new Map();
    mapeo.forEach(x=>{
      const sd=x.sede?x.sede.trim().toUpperCase():"";
      if(!sd) return;
      if(x.origen){ m.set(norm(x.origen),sd); const c=claveSuave(x.origen); if(c) sv.set(c,sd); }
      const cs=claveSuave(sd); if(cs&&!sv.has(cs)) sv.set(cs,sd);
      CLUSTER_BY_SEDE.set(sd,x.cluster||"Sin cluster");
      if(x.cluster===NO_INCLUIR) ig.add(sd);
    });
    return {mapa:m,suave:sv,ignorar:ig};
  },[mapeo]);

  const cfgSedes=useMemo(()=>[...new Set(mapeo.filter(m=>m.cluster!==NO_INCLUIR).map(m=>m.sede&&m.sede.trim().toUpperCase()).filter(Boolean))].sort(),[mapeo]);
  const hechos=useHechos(habeas,usarAnexos?anexos:[],ignorar);
  const [guardaLocal,setGuardaLocal]=useState(true);

  useEffect(()=>{
    const t=setTimeout(()=>{
      const ok=escribirLocal({habeas,anexos,presupuesto:presu,mapeo,usarAnexos});
      setGuardaLocal(ok);
    },900);                       // espera a que dejes de escribir para no trabar la app
    return ()=>clearTimeout(t);
  },[habeas,anexos,presu,mapeo,usarAnexos]);

  const addAnexos=useCallback(nuevas=>{
    let agregados=0,repetidos=0;
    setAnexos(prev=>{
      const vistos=new Set(prev.map(a=>a.f+"|"+a.s));
      const add=[];
      nuevas.forEach(a=>{
        const k=a.f+"|"+a.s;
        if(vistos.has(k)){ repetidos+=a.n; }
        else{ vistos.add(k); add.push(a); agregados+=a.n; }
      });
      return add.length?[...prev,...add]:prev;
    });
    return {agregados,repetidos};
  },[]);

  const guardarMemoria=useCallback(()=>{
    const hoy=new Date();
    const payload={tipo:"memoria_clientes_nuevos",version:1,
      guardado:hoy.toISOString(),habeas,anexos,presupuesto:presu,mapeo,usarAnexos};
    try{
      const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.rel="noopener";
      a.download=`memoria_clientes_nuevos_${hoy.getFullYear()}-${p2(hoy.getMonth()+1)}-${p2(hoy.getDate())}.json`;
      document.body.appendChild(a); a.click();
      setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
      notify("Memoria guardada");
    }catch(e){ notify("No pude generar el archivo: "+e.message); }
  },[habeas,anexos,presu,mapeo,usarAnexos,notify]);

  const cargarMemoria=useCallback(j=>{
    if(j.habeas) setHabeas(j.habeas);
    if(Array.isArray(j.anexos)) setAnexos(j.anexos);
    if(j.presupuesto) setPresu(j.presupuesto);
    if(Array.isArray(j.mapeo)&&j.mapeo.length) setMapeo(migrarMapeo(j.mapeo));
    if(typeof j.usarAnexos==="boolean") setUsarAnexos(j.usarAnexos);
  },[]);

  const hayDatos=habeas||anexos.length>0;
  const capRef=useRef(null);
  const [capturando,setCapturando]=useState(false);
  const [menu,setMenu]=useState(false);

  /** Toma una foto del dashboard. destino: "png" | "pdf" */
  const capturar=useCallback(async destino=>{
    setMenu(false);
    const nodo=capRef.current;
    if(!nodo){ notify("No encontré el tablero para capturar."); return; }
    if(typeof html2canvas!=="function"){
      notify("No cargó la herramienta de captura. Revisa la conexión y recarga la página."); return;
    }
    if(destino==="pdf" && !(window.jspdf&&window.jspdf.jsPDF)){
      notify("No cargó el generador de PDF. Descarga la imagen o recarga la página."); return;
    }
    setCapturando(true);
    notify("Preparando el archivo…");
    // esperar a que el navegador repinte con la banda visible y los filtros ocultos
    await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(()=>setTimeout(r,220))));
    let lienzo=null;
    try{
      const ancho=nodo.scrollWidth, alto=nodo.scrollHeight;
      // bajar la resolución si el tablero es muy largo, para no agotar la memoria
      const escala=Math.max(1,Math.min(2,Math.floor(9000000/Math.max(1,ancho*alto))||1));
      lienzo=await html2canvas(nodo,{
        scale:escala, backgroundColor:"#f5f7f3", useCORS:true, logging:false,
        width:ancho, height:alto, windowWidth:ancho, scrollX:0, scrollY:0,
        imageTimeout:8000, removeContainer:true
      });
    }catch(e){
      setCapturando(false);
      notify("No pude generar la captura: "+(e&&e.message?e.message:"error desconocido"));
      return;
    }
    setCapturando(false);
    if(!lienzo||!lienzo.width||!lienzo.height){ notify("La captura salió vacía. Intenta de nuevo."); return; }
    try{
      const hoy=new Date();
      const nom=`clientes_nuevos_${hoy.getFullYear()}-${p2(hoy.getMonth()+1)}-${p2(hoy.getDate())}`;
      if(destino==="png"){
        lienzo.toBlob(b=>{
          if(!b){ notify("No pude preparar la imagen."); return; }
          const url=URL.createObjectURL(b), a=document.createElement("a");
          a.href=url; a.download=nom+".png"; document.body.appendChild(a); a.click();
          setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
          notify("Imagen lista para el correo");
        },"image/png");
      }else{
        const {jsPDF}=window.jspdf;
        const horizontal=lienzo.width>=lienzo.height;
        const pdf=new jsPDF({orientation:horizontal?"landscape":"portrait",unit:"mm",format:"a4"});
        const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight(), m=8;
        const esc=Math.min((pw-m*2)/lienzo.width,(ph-m*2)/lienzo.height);
        const w=lienzo.width*esc, h=lienzo.height*esc;
        pdf.addImage(lienzo.toDataURL("image/jpeg",0.92),"JPEG",(pw-w)/2,m,w,h,undefined,"FAST");
        pdf.save(nom+".pdf");
        notify("PDF listo para adjuntar");
      }
    }catch(e){
      notify("No pude guardar el archivo: "+(e&&e.message?e.message:"error desconocido"));
    }
  },[notify]);

  useEffect(()=>{
    if(!menu) return;
    const f=()=>setMenu(false);
    window.addEventListener("click",f); return ()=>window.removeEventListener("click",f);
  },[menu]);

  const [modal,setModal]=useState(null);          // null | "datos" | "ajustes"
  const [tabAj,setTabAj]=useState("presu");
  useEffect(()=>{
    const esc=e=>{ if(e.key==="Escape") setModal(null); };
    window.addEventListener("keydown",esc); return ()=>window.removeEventListener("keydown",esc);
  },[]);
  useEffect(()=>{ if(!hayDatos) setModal(m=>m||"datos"); },[]);

  const panelDatos=(
    <Datos habeas={habeas} anexos={anexos} mapa={mapa} suave={suave} hechos={hechos}
      onHabeas={setHabeas} onAnexos={addAnexos} 
      onMemoria={cargarMemoria} /* <--- AQUÍ ESTABA EL ERROR (antes decía guardarMemoria) */
      memoria={guardarMemoria} notify={notify} setTab={()=>setModal(null)}
      usarAnexos={usarAnexos} setUsarAnexos={setUsarAnexos}
      guardaLocal={guardaLocal} onLimpiar={()=>{
        if(!confirm("Esto borra la base, los reportes y el presupuesto de este equipo. La memoria que hayas guardado no se toca. ¿Sigues?")) return;
        borrarLocal(); setHabeas(null); setAnexos([]); setPresu({}); setMapeo(MAPEO_INI); notify("Todo borrado");
      }}/>
  );

  return (
    <div className="app">
      <div className="hd">
        <img className="logo" src={LOGO} alt="Supertiendas Cañaveral"/>
        <div className="sep"/>
        <div className="ttl">Clientes Nuevos<span>Seguimiento de registro y cumplimiento</span></div>
        <div className="hd-r">
          {hechos.corte && <span className="chip">Corte {hechos.corte}</span>}
          {hayDatos && (
            <div className="mw" onClick={e=>e.stopPropagation()}>
              <button className="hbtn ico" onClick={()=>setMenu(m=>!m)} disabled={capturando}
                title="Enviar por correo" aria-label="Compartir el dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                  <circle cx="12" cy="13" r="4"/>
                </svg>
              </button>
              {menu && (
                <div className="mn">
                  <button onClick={()=>capturar("png")}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>Descargar imagen<small>PNG, para pegar en el correo</small></span>
                  </button>
                  <div className="sepm"/>
                  <button onClick={()=>{setMenu(false);setTimeout(()=>window.print(),120);}}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <polyline points="6 9 6 2 18 2 18 9"/>
                      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
                      <rect x="6" y="14" width="12" height="8"/>
                    </svg>
                    <span>Imprimir o guardar PDF<small>Usa el navegador · el más confiable</small></span>
                  </button>
                  <div className="sepm"/>
                  <button onClick={()=>capturar("pdf")}>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span>Descargar PDF<small>Una sola hoja, generado aquí</small></span>
                  </button>
                </div>
              )}
            </div>
          )}
          {hayDatos && (
            <button className="hbtn" onClick={guardarMemoria} title="Guardar la memoria en el equipo">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              Guardar
            </button>
          )}
          <button className={"hbtn"+(modal==="datos"?" on":"")} onClick={()=>setModal("datos")}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Datos
            {!hayDatos && <span className="dotw"/>}
          </button>
          <button className={"hbtn ico"+(modal==="ajustes"?" on":"")} onClick={()=>setModal("ajustes")}
            title="Presupuesto y configuración" aria-label="Presupuesto y configuración">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>

      <div className={"main"+(capturando?" capturando":"")} ref={capRef}>
        {hayDatos
          ? <Dashboard hechos={hechos} presu={presu} mapa={mapa} cfgSedes={cfgSedes} capturando={capturando}/>
          : <div className="card"><div className="empty">
              <img src={MASCOTA} alt=""/>
              <h4>Empecemos</h4>
              <p>Carga la base de Habeas Data o una memoria guardada y aquí verás el cumplimiento de cada sede.</p>
              <button className="btn" style={{marginTop:16}} onClick={()=>setModal("datos")}>Cargar datos</button>
            </div></div>}
      </div>

      {modal==="datos" && (
        <div className="ov" onMouseDown={e=>{if(e.target===e.currentTarget)setModal(null);}}>
          <div className="md" role="dialog" aria-modal="true" aria-label="Datos">
            <div className="md-h">
              <h2>Datos</h2>
              <button className="x" onClick={()=>setModal(null)} aria-label="Cerrar">×</button>
            </div>
            <div className="md-b">{panelDatos}</div>
          </div>
        </div>
      )}

 {modal==="ajustes" && (
        <div className="ov" onMouseDown={e=>{if(e.target===e.currentTarget)setModal(null);}}>
          <div className="md" role="dialog" aria-modal="true" aria-label="Ajustes">
            <div className="md-h">
              <h2>Ajustes</h2>
              <button className="x" onClick={()=>setModal(null)} aria-label="Cerrar">×</button>
            </div>
            <div className="md-t">
              <button className={tabAj==="presu"?"on":""} onClick={()=>setTabAj("presu")}>Presupuesto</button>
              <button className={tabAj==="cfg"?"on":""} onClick={()=>setTabAj("cfg")}>Sedes</button>
            </div>
            <div className="md-b">
              {tabAj==="presu"
                ? <Presupuesto presu={presu} setPresu={setPresu} cfgSedes={cfgSedes}
                    anios={hechos.anios} notify={notify} mapa={mapa} suave={suave}/>
                : <Config mapeo={mapeo} setMapeo={setMapeo} notify={notify}/>}
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}

      {/* --- CÓDIGO NUEVO AGREGADO AQUÍ --- */}
      <div className="ft">
        BY SUPERTIENDAS CAÑAVERAL , Y creadores Felipe Vanegas & Adriana Escobar
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
